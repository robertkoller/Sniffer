<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sniffer - Find Your Signature Scent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        /**
         * LOCAL DEVELOPMENT TIP:
         * To fix the "API Key not valid" error on your local machine:
         * Replace 'PLACEHOLDER_API_KEY' below with your actual Gemini API Key.
         */
        window.process = {
            env: {
                API_KEY: 'PLACEHOLDER_API_KEY' 
            }
        };
    </script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #FFFDF9;
            color: #451a03;
            cursor: default;
        }
        .serif {
            font-family: 'Playfair Display', serif;
        }
        
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.98) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-results {
            animation: fadeInScale 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Border Beam Effect */
        .border-beam {
            position: relative;
            z-index: 0;
            overflow: hidden;
        }
        .border-beam::before {
            content: '';
            position: absolute;
            z-index: -2;
            left: -50%;
            top: -50%;
            width: 200%;
            height: 200%;
            background-color: transparent;
            background-repeat: no-repeat;
            background-size: 50% 50%, 50% 50%;
            background-position: 0 0, 100% 0, 100% 100%, 0 100%;
            background-image: linear-gradient(rgba(251, 191, 36, 0), rgba(251, 191, 36, 0.5));
            animation: rotate 4s linear infinite;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .border-beam:hover::before {
            opacity: 1;
        }
        @keyframes rotate {
            100% { transform: rotate(1turn); }
        }

        /* Smooth reveal for notes */
        .note-item {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .note-item:hover {
            transform: scale(1.1) translateY(-2px);
            background-color: #fef3c7;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #FFFDF9; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #d1d5db; }
    </style>
